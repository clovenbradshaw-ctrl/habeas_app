<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      DEV PREVIEW ENTRY POINT (admin only)
      Uses the same hardcoded login bootstrap as the main index.html.
      Sets window._amino_devMode = true so the admin sees the DEV badge.

      Loads app code from habeas_patches main branch (flat file structure —
      no preview/ folder exists in the fork). The admin uses the Deployments
      panel to pin specific versions via the App Version Source controls.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>[DEV] Habeas — Amino Immigration</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <style>
      :root {
        --bg: #f5f2ec; --panel: #fffdf8; --ink: #1a1612; --muted: #7a6f63;
        --accent: #a08540; --accent2: #8b2500; --border: #d4cdc2;
        --field-bg: #fff; --field-focus: #a08540; --green: #5a9e6f;
        --shadow-lg: 0 4px 24px rgba(0,0,0,0.08); --radius: 4px;
      }
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: var(--bg); color: var(--ink);
        font-family: "DM Sans","Helvetica Neue",Arial,sans-serif;
        font-size: 13px; -webkit-font-smoothing: antialiased; }
      .loading-wrap { height: 100vh; display: flex; align-items: center;
        justify-content: center; background: var(--bg); }
      .loading-text { font-size: 14px; color: var(--muted); letter-spacing: 1px; }
      .login-wrap { height: 100vh; display: flex; align-items: center;
        justify-content: center; background: var(--bg); }
      .login-box { width: 340px; background: var(--panel);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 36px 32px 28px; box-shadow: var(--shadow-lg); }
      .login-brand { font-family: "Source Serif 4",Georgia,serif; font-size: 28px;
        font-weight: 700; color: var(--ink); text-align: center; letter-spacing: 1px; }
      .login-sub { font-size: 12px; text-align: center; color: var(--muted);
        margin: 4px 0 24px; letter-spacing: 0.5px; }
      .login-sub.login-sub-small { margin: -12px 0 16px; font-size: 11px; color: var(--accent); }
      .login-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca;
        border-radius: var(--radius); padding: 8px 12px; margin-bottom: 16px;
        font-size: 12px; display: none; }
      .login-btn { width: 100%; margin-top: 8px; }
      .login-server { text-align: center; font-size: 10px; color: #bbb; margin-top: 16px; }
      .login-toggle { text-align: center; font-size: 12px; color: var(--muted); margin-top: 16px; }
      .login-toggle a { color: var(--accent); text-decoration: none; font-weight: 600; }
      .login-toggle a:hover { text-decoration: underline; }
      .hbtn { font-family: inherit; font-size: 11px; font-weight: 600;
        letter-spacing: 0.5px; text-transform: uppercase; padding: 7px 14px;
        border: 1.5px solid var(--border); border-radius: var(--radius);
        background: var(--panel); color: var(--ink); cursor: pointer;
        transition: all 0.12s; white-space: nowrap; }
      .hbtn:hover { border-color: var(--accent); color: var(--accent); }
      .hbtn:disabled { opacity: 0.4; cursor: default; }
      .hbtn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
      .hbtn.accent:hover { background: #b8962e; }
      .frow { margin-bottom: 10px; }
      .flbl { display: block; font-size: 10px; font-weight: 600; color: var(--muted);
        letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 3px; }
      .finp { width: 100%; padding: 7px 10px; border: 1px solid var(--border);
        border-radius: var(--radius); background: var(--field-bg);
        font-family: inherit; font-size: 12px; color: var(--ink);
        transition: border-color 0.15s, box-shadow 0.15s; }
      .finp:focus { outline: none; border-color: var(--field-focus);
        box-shadow: 0 0 0 2px rgba(160,133,64,0.12); }
      .finp::placeholder { color: #c0b8a8; }
      .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999;
        display: flex; flex-direction: column-reverse; gap: 8px; pointer-events: none; }
      .toast { pointer-events: auto; max-width: 360px; padding: 10px 16px;
        border-radius: var(--radius); font-family: inherit; font-size: 12px;
        font-weight: 500; line-height: 1.4; box-shadow: var(--shadow-lg); cursor: pointer;
        transform: translateX(calc(100% + 20px)); opacity: 0;
        transition: transform 0.3s ease, opacity 0.3s ease; }
      .toast.show { transform: translateX(0); opacity: 1; }
      .toast.hide { transform: translateX(calc(100% + 20px)); opacity: 0; }
      .toast-success { background: var(--green); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
      .toast-error { background: var(--accent2); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
      .toast-info { background: var(--panel); color: var(--muted); border: 1px solid var(--border); }
      /* Dev mode banner */
      .dev-banner { background: #1a1612; color: #f5c842; font-size: 11px;
        font-weight: 600; text-align: center; padding: 6px; letter-spacing: 1px;
        text-transform: uppercase; }
      #root { height: 100%; display: none; }
    </style>
  </head>
  <body>

    <!-- Dev mode indicator banner -->
    <div class="dev-banner">&#9888; DEV PREVIEW &mdash; Admin Only</div>

    <!-- ── LOGIN (hardcoded, same as main index.html) ─── -->
    <div id="amino-login">
      <div class="login-wrap">
        <form class="login-box" id="login-form" novalidate>
          <div class="login-brand">Habeas</div>
          <div class="login-sub">Amino Immigration</div>
          <div class="login-error" id="login-error"></div>
          <div class="frow">
            <label class="flbl" for="login-user">Username</label>
            <input class="finp" type="text" id="login-user" name="username"
              placeholder="attorney" autocomplete="username" autofocus />
          </div>
          <div class="frow">
            <label class="flbl" for="login-pass">Password</label>
            <input class="finp" type="password" id="login-pass" name="password"
              placeholder="password" autocomplete="current-password" />
          </div>
          <button type="submit" class="hbtn accent login-btn" id="login-btn">Sign In</button>
          <div class="login-toggle">
            Need an account? <a href="#" id="show-register">Register</a>
          </div>
          <div class="login-server">Server: app.aminoimmigration.com [DEV]</div>
        </form>
      </div>
    </div>

    <!-- ── REGISTER (hidden by default) ────────────────── -->
    <div id="amino-register" style="display:none">
      <div class="login-wrap">
        <form class="login-box" id="register-form" novalidate>
          <div class="login-brand">Habeas</div>
          <div class="login-sub">Amino Immigration</div>
          <div class="login-sub login-sub-small">Create Account</div>
          <div class="login-error" id="register-error"></div>
          <div class="frow">
            <label class="flbl" for="register-email">Email</label>
            <input class="finp" type="email" id="register-email" autocomplete="email" autofocus />
          </div>
          <div class="frow">
            <label class="flbl" for="register-user">Username</label>
            <input class="finp" type="text" id="register-user" autocomplete="username" />
          </div>
          <div class="frow">
            <label class="flbl" for="register-display">Display Name</label>
            <input class="finp" type="text" id="register-display" autocomplete="name" />
          </div>
          <div class="frow">
            <label class="flbl" for="register-pass">Password</label>
            <input class="finp" type="password" id="register-pass" autocomplete="new-password" />
          </div>
          <div class="frow">
            <label class="flbl" for="register-pass2">Confirm Password</label>
            <input class="finp" type="password" id="register-pass2" autocomplete="new-password" />
          </div>
          <button type="submit" class="hbtn accent login-btn" id="register-btn">Create Account</button>
          <div class="login-toggle">
            Already have an account? <a href="#" id="show-login">Sign In</a>
          </div>
          <div class="login-server">
            Allowed domains: aminoimmigration.com, rklacylaw.com, aminointegration.com
          </div>
        </form>
      </div>
    </div>

    <!-- ── LOADING ───────────────────────────────────────── -->
    <div id="amino-loading" style="display:none">
      <div class="loading-wrap">
        <div class="loading-text" id="loading-text">Connecting&hellip;</div>
      </div>
    </div>

    <!-- ── APP CONTAINER ──────────────────────────────────── -->
    <div id="root"></div>
    <div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@9.5.3/build/index.umd.js"></script>

    <!-- Signal dev mode BEFORE app.js loads -->
    <script>window._amino_devMode = true;</script>

    <!-- ── DEV BOOTSTRAP (same logic as main, bypasses EVT_VERSION) ──
         Loads directly from habeas_patches main branch so the admin
         sees exactly what is currently deployed (no pinned version).
    ──────────────────────────────────────────────────────────────── -->
    <script>
    (function() {
      'use strict';

      var CFG = {
        matrixServerUrl: 'https://app.aminoimmigration.com',
        orgRoomAlias: '#org:aminoimmigration.com',
        allowedDomains: ['aminoimmigration.com', 'rklacylaw.com', 'aminointegration.com'],
        // Dev preview always loads from habeas_patches main branch (latest deployed)
        appJs:  'https://clovenbradshaw-ctrl.github.io/habeas_patches/app.js',
        cssUrl: 'https://clovenbradshaw-ctrl.github.io/habeas_patches/styles.css',
        patchesRepo: 'clovenbradshaw-ctrl/habeas_patches',
      };

      function bsToast(msg, type) {
        var c = document.getElementById('toast-container');
        if (!c) return;
        var el = document.createElement('div');
        el.className = 'toast toast-' + (type || 'info');
        el.textContent = msg;
        c.appendChild(el);
        el.offsetHeight;
        el.classList.add('show');
        var dur = type === 'error' ? 6000 : 3000;
        var t = setTimeout(function() { bsDismiss(el); }, dur);
        el.addEventListener('click', function() { clearTimeout(t); bsDismiss(el); });
      }
      function bsDismiss(el) {
        if (!el || !el.parentNode) return;
        el.classList.remove('show');
        el.classList.add('hide');
        setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
      }

      function showLogin() {
        document.getElementById('amino-login').style.display = '';
        document.getElementById('amino-register').style.display = 'none';
        document.getElementById('amino-loading').style.display = 'none';
      }
      function showRegister() {
        document.getElementById('amino-login').style.display = 'none';
        document.getElementById('amino-register').style.display = '';
        document.getElementById('amino-loading').style.display = 'none';
      }
      function showLoading(msg) {
        document.getElementById('amino-login').style.display = 'none';
        document.getElementById('amino-register').style.display = 'none';
        var ld = document.getElementById('amino-loading');
        ld.style.display = '';
        var lt = document.getElementById('loading-text');
        if (lt) lt.textContent = msg || 'Connecting\u2026';
      }

      function mxFetch(method, path, body, token) {
        var ctrl = new AbortController();
        var tid = setTimeout(function() { ctrl.abort(); }, 15000);
        var hdrs = { 'Content-Type': 'application/json' };
        if (token) hdrs['Authorization'] = 'Bearer ' + token;
        return fetch(CFG.matrixServerUrl + '/_matrix/client/v3' + path, {
          method: method, headers: hdrs,
          body: body ? JSON.stringify(body) : undefined,
          signal: ctrl.signal,
        }).then(function(r) {
          clearTimeout(tid);
          return r.json().then(function(d) {
            if (!r.ok) { d.status = r.status; throw d; }
            return d;
          });
        }).catch(function(e) {
          clearTimeout(tid);
          if (e && e.name === 'AbortError') throw { error: 'Request timed out.', status: 0 };
          throw e;
        });
      }

      var SESSION_KEY = 'amino_matrix_session';
      function saveSession(data) {
        try {
          sessionStorage.setItem(SESSION_KEY, JSON.stringify({
            baseUrl: CFG.matrixServerUrl, userId: data.user_id,
            accessToken: data.access_token, deviceId: data.device_id,
          }));
        } catch(e) {}
      }
      function loadSession() {
        try {
          var raw = sessionStorage.getItem(SESSION_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch(e) { return null; }
      }

      // Dev preview always loads from habeas_patches main (latest deployed commit).
      // DEPLOY_INFO will be populated by the deploy-info.js already served there,
      // so we do NOT set window.DEPLOY_INFO here — let deploy-info.js from the CDN
      // provide the real SHA of the currently deployed version.
      function injectApp() {
        window._amino_bootstrapMode = true;

        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = CFG.cssUrl;
        document.head.appendChild(link);

        // Load deploy-info.js first so DEPLOY_INFO is set before app.js runs
        var diScript = document.createElement('script');
        diScript.src = 'https://clovenbradshaw-ctrl.github.io/habeas_patches/deploy-info.js';
        diScript.onload = function() {
          var appScript = document.createElement('script');
          appScript.src = CFG.appJs;
          appScript.onerror = function() {
            try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
            showLogin();
            var err = document.getElementById('login-error');
            if (err) { err.textContent = 'Failed to load app. Please refresh.'; err.style.display = 'block'; }
          };
          document.head.appendChild(appScript);
        };
        diScript.onerror = function() {
          // deploy-info.js missing — inject app.js anyway (DEPLOY_INFO will be undefined)
          var appScript = document.createElement('script');
          appScript.src = CFG.appJs;
          document.head.appendChild(appScript);
        };
        document.head.appendChild(diScript);

        document.getElementById('amino-loading').style.display = 'none';
        document.getElementById('root').style.display = '';
      }

      function loadApp() {
        showLoading('Connecting\u2026 [DEV]');
        injectApp();
      }

      function loginErrMsg(err) {
        var status = (err && err.status) || 0;
        if (status === 502 || status === 503 || status === 504)
          return 'Matrix server unavailable (HTTP ' + status + '). Please try again later.';
        if (status === 0 || (err && err.errcode === 'M_NETWORK'))
          return 'Cannot reach the Matrix server. Check your network connection.';
        return (err && (err.error || err.message)) || 'Login failed. Check your credentials.';
      }

      document.addEventListener('DOMContentLoaded', function() {
        var session = loadSession();
        if (session && session.accessToken) { loadApp(); return; }

        showLogin();

        document.getElementById('login-form').addEventListener('submit', function(e) {
          e.preventDefault();
          var user  = document.getElementById('login-user').value.trim();
          var pass  = document.getElementById('login-pass').value;
          var errEl = document.getElementById('login-error');
          var btn   = document.getElementById('login-btn');
          if (!user || !pass) return;
          btn.disabled = true; btn.textContent = 'Signing in\u2026';
          errEl.style.display = 'none';
          mxFetch('POST', '/login', {
            type: 'm.login.password',
            identifier: { type: 'm.id.user', user: user },
            password: pass,
            initial_device_display_name: 'Amino Habeas Dev',
          }).then(function(data) {
            saveSession(data); loadApp();
          }).catch(function(err) {
            btn.disabled = false; btn.textContent = 'Sign In';
            errEl.textContent = loginErrMsg(err); errEl.style.display = 'block';
          });
        });

        document.getElementById('register-form').addEventListener('submit', function(e) {
          e.preventDefault();
          var email   = document.getElementById('register-email').value.trim();
          var user    = document.getElementById('register-user').value.trim();
          var display = (document.getElementById('register-display').value.trim()) || user;
          var pass    = document.getElementById('register-pass').value;
          var pass2   = document.getElementById('register-pass2').value;
          var errEl   = document.getElementById('register-error');
          var btn     = document.getElementById('register-btn');
          errEl.style.display = 'none';
          if (!email) { errEl.textContent = 'Email is required.'; errEl.style.display = 'block'; return; }
          var domain = email.split('@')[1] || '';
          var ok = CFG.allowedDomains.some(function(d) { return domain.toLowerCase() === d.toLowerCase(); });
          if (!ok) { errEl.textContent = 'Allowed: ' + CFG.allowedDomains.join(', '); errEl.style.display = 'block'; return; }
          if (!user) { errEl.textContent = 'Username required.'; errEl.style.display = 'block'; return; }
          if (!pass || pass.length < 8) { errEl.textContent = 'Password min 8 chars.'; errEl.style.display = 'block'; return; }
          if (pass !== pass2) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
          btn.disabled = true; btn.textContent = 'Creating\u2026';
          var savedData = null;
          mxFetch('POST', '/register', {
            auth: { type: 'm.login.dummy' }, username: user, password: pass,
            initial_device_display_name: 'Amino Habeas Dev',
          }).then(function(data) {
            savedData = data; saveSession(data);
            if (display && display !== user) {
              return mxFetch('PUT', '/profile/' + encodeURIComponent(data.user_id) + '/displayname',
                { displayname: display }, data.access_token).catch(function() {});
            }
          }).then(function() {
            loadApp();
          }).catch(function(err) {
            btn.disabled = false; btn.textContent = 'Create Account';
            errEl.textContent = (err && (err.error || err.message)) || 'Registration failed.';
            errEl.style.display = 'block';
          });
        });

        document.getElementById('show-register').addEventListener('click', function(e) { e.preventDefault(); showRegister(); });
        document.getElementById('show-login').addEventListener('click', function(e) { e.preventDefault(); showLogin(); });
      });

    })();
    </script>

  </body>
</html>
