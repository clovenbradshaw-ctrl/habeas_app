name: Sync Preview from Upstream (habeas_app)

# Triggered by the admin from the app's Deployments panel (Admin → Deployments →
# "Sync to Preview"), or manually from GitHub Actions UI.
# Checks out the latest habeas_app main branch and copies all app files into
# this repo's preview/ directory, then commits and pushes.
#
# Designed to run in habeas_patches (the fork). Not intended to run in habeas_app itself.
# If triggered accidentally in habeas_app it will fail cleanly (no preview/ writes to main).

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (habeas_patches)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone upstream habeas_app
        run: |
          git clone --depth 1 https://github.com/clovenbradshaw-ctrl/habeas_app.git upstream

      - name: Copy upstream files to preview/
        run: |
          mkdir -p preview
          # Copy all app files except .git, preview/ itself, and .github/
          rsync -av \
            --exclude='.git' \
            --exclude='preview' \
            --exclude='.github' \
            upstream/ preview/

      - name: Stamp preview/deploy-info.js with upstream SHA
        run: |
          SHA=$(git -C upstream rev-parse HEAD)
          SHORT_SHA=$(git -C upstream rev-parse --short HEAD)
          MSG=$(git -C upstream log -1 --pretty=%s | sed "s/\"/'/g")
          AUTHOR=$(git -C upstream log -1 --pretty=%an | sed "s/\"/'/g")
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > preview/deploy-info.js << DEPLOY_EOF
          var DEPLOY_INFO = {
            sha: "$SHA",
            shortSha: "$SHORT_SHA",
            timestamp: "$TIMESTAMP",
            message: "$MSG",
            author: "$AUTHOR",
            env: "preview",
            repo: "clovenbradshaw-ctrl/habeas_app"
          };
          DEPLOY_EOF

      - name: Commit and push preview/ changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add preview/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          UPSTREAM_SHORT=$(git -C upstream rev-parse --short HEAD)
          git commit -m "sync: preview from habeas_app $UPSTREAM_SHORT"
          git push origin main
