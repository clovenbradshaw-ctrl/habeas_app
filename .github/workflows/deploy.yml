name: Deploy to Production

on:
  # Admin-gated: production deploys are manual only.
  # Merging PRs to main does NOT auto-deploy. An admin must trigger
  # this workflow from the app's Deployment panel or GitHub Actions UI.
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Commit SHA to deploy (leave blank for latest main)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha || github.ref }}
          fetch-depth: 0

      - name: Get deployment metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          # Try to extract PR number from merge commit message
          PR_NUM=$(git log -1 --pretty=%s | grep -oP '#\K[0-9]+' || echo "")
          echo "pr_number=${PR_NUM}" >> $GITHUB_OUTPUT

      - name: Stamp version info
        run: |
          cat > deploy-info.js << 'DEPLOY_EOF'
          var DEPLOY_INFO = {
            sha: "${{ steps.meta.outputs.sha }}",
            shortSha: "${{ steps.meta.outputs.short_sha }}",
            timestamp: "${{ steps.meta.outputs.timestamp }}",
            message: "${{ steps.meta.outputs.message }}",
            author: "${{ steps.meta.outputs.author }}",
            prNumber: "${{ steps.meta.outputs.pr_number }}",
            env: "production",
            repo: "${{ github.repository }}"
          };
          DEPLOY_EOF

      - name: Copy 404.html for SPA routing
        run: cp index.html 404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,CLAUDE.md,.gitignore'
