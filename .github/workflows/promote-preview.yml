name: Promote Preview to Production

# Triggered by the admin from the app's Dev Mode panel (Admin → Deployments → Dev Mode →
# "Approve & Deploy Live"), or manually from GitHub Actions UI.
# Copies the staged preview/ files to the repo root, commits, and deploys to GitHub Pages.
# After this runs, all users who reload will get the new version.
#
# Designed to run in habeas_patches (the fork). Requires GitHub Pages to be configured
# with Source = "GitHub Actions" (Settings → Pages → Source).

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate preview/ exists
        run: |
          if [ ! -f preview/app.js ]; then
            echo "ERROR: preview/app.js not found. Run sync-preview.yml first."
            exit 1
          fi
          if [ ! -f preview/deploy-info.js ]; then
            echo "ERROR: preview/deploy-info.js not found. Run sync-preview.yml first."
            exit 1
          fi

      - name: Promote preview/ to root (overwrite production files)
        run: |
          # Copy preview files to root, skipping .git and the preview/ dir itself
          rsync -av \
            --exclude='.git' \
            --exclude='preview' \
            --exclude='.github' \
            preview/ .
          # Rebuild 404.html for SPA routing
          cp index.html 404.html

      - name: Commit promoted files to main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          PREVIEW_SHORT=$(node -e "eval(require('fs').readFileSync('deploy-info.js','utf8')); console.log(DEPLOY_INFO.shortSha);" 2>/dev/null || echo "unknown")
          git add app.js styles.css deploy-info.js template.html courts.json facilities.json favicon.svg 404.html 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "promote: $PREVIEW_SHORT to production"
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
