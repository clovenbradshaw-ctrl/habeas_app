name: Rollback Production

# Rollback to a specific commit SHA.
# Triggered from the app's Deployment panel or GitHub Actions UI.
#
# IMPORTANT: GitHub Pages must be configured with Source = "GitHub Actions"
# (NOT "Deploy from a branch"). See deploy.yml for details.

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Commit SHA to deploy (rollback target)'
        required: true
        type: string
      reason:
        description: 'Reason for rollback'
        required: false
        type: string
        default: 'Manual rollback'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha }}
          fetch-depth: 0

      - name: Get deployment metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          PR_NUM=$(git log -1 --pretty=%s | grep -oP '#\K[0-9]+' || echo "")
          echo "pr_number=${PR_NUM}" >> $GITHUB_OUTPUT

      - name: Stamp version info (rollback)
        run: |
          cat > deploy-info.js << 'DEPLOY_EOF'
          var DEPLOY_INFO = {
            sha: "${{ steps.meta.outputs.sha }}",
            shortSha: "${{ steps.meta.outputs.short_sha }}",
            timestamp: "${{ steps.meta.outputs.timestamp }}",
            message: "${{ steps.meta.outputs.message }}",
            author: "${{ steps.meta.outputs.author }}",
            prNumber: "${{ steps.meta.outputs.pr_number }}",
            env: "production",
            repo: "${{ github.repository }}",
            rollback: true,
            rollbackReason: "${{ inputs.reason }}",
            deployedAt: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          };
          DEPLOY_EOF

      - name: Copy 404.html for SPA routing
        run: cp index.html 404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy rollback to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
